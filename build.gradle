plugins {
    id 'java-library'
    id 'maven-publish'
    id 'idea'
    id 'net.neoforged.moddev' version '2.0.141'
}

version = mod_version
group = mod_group_id

repositories {
    mavenLocal()
    maven { url "https://maven.blamejared.com" }
}

base {
    archivesName = mod_id
}

java.toolchain.languageVersion = JavaLanguageVersion.of(21)

neoForge {
    // Specify the version of NeoForge to use.
    version = project.neo_version

    parchment {
        mappingsVersion = project.parchment_mappings_version
        minecraftVersion = project.parchment_minecraft_version
    }

    // This line is optional. Access Transformers are automatically detected
    // accessTransformers.add('src/main/resources/META-INF/accesstransformer.cfg')

    // Default run configurations.
    // These can be tweaked, removed, or duplicated as needed.
    runs {
        client {
            client()
            programArguments = [
                    "--enable-native-access=ALL",
                    "--width",
                    "2560",
                    "--height",
                    "1440",
                    "--username",
                    "blackdawn",
                    "--quickPlaySinglePlayer",
                    "新的世界"
            ]
            gameDirectory = project.file('run')
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
            systemProperty 'eecore.project.dir', project.projectDir.absolutePath
        }
        production {
            client()
            programArguments = [
                    "--enable-native-access=ALL",
                    "--width", "2560",
                    "--height", "1440",
                    "--username", "ForiLuSa"
            ]
            gameDirectory = file(mcInstance)
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
            systemProperty 'eecore.project.dir', project.projectDir.absolutePath
        }

        server {
            server()
            programArgument '--nogui'
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        // This run config launches GameTestServer and runs all registered gametests, then exits.
        // By default, the server will crash when no gametests are provided.
        // The gametest system is also enabled by default for other run configs under the /test command.
        gameTestServer {
            type = "gameTestServer"
            systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        }

        data {
            data()

            // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
            // gameDirectory = project.file('run-data')

            // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
            programArguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
        }

        // applies to all the run configs above
        configureEach {
            // Recommended logging data for a userdev environment
            // The markers can be added/remove as needed separated by commas.
            // "SCAN": For mods scan.
            // "REGISTRIES": For firing of registry events.
            // "REGISTRYDUMP": For getting the contents of all registries.
            systemProperty 'forge.logging.markers', 'REGISTRIES'

            // Recommended logging level for the console
            // You can set various levels here.
            // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
            logLevel = org.slf4j.event.Level.DEBUG
        }
    }

    mods {
        // define mod <-> source bindings
        // these are used to tell the game which sources are for which mod
        // mostly optional in a single mod project
        // but multi mod projects should define one per mod
        "${mod_id}" {
            sourceSet(sourceSets.main)
        }
    }
}

// Include resources generated by data generators.
sourceSets.main.resources { srcDir 'src/generated/resources' }


dependencies {
    // JUnit 5 for unit tests / 单元测试
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'


    def ae2Jar = fileTree("libs").matching { include "*appliedenergistics2*" }
    if (!ae2Jar.empty) { compileOnly ae2Jar; runtimeOnly ae2Jar }

    def guideMeJar = fileTree("libs").matching { include "*guideme*" }
    if (!guideMeJar.empty) { compileOnly guideMeJar; runtimeOnly guideMeJar }

    def jadeJar = fileTree("libs").matching { include "*Jade*" }
    if (!jadeJar.empty) { compileOnly jadeJar; runtimeOnly jadeJar }

    // JEI — for multiblock structure preview
    compileOnly "mezz.jei:jei-1.21.1-common-api:19.27.0.343"
    compileOnly "mezz.jei:jei-1.21.1-neoforge-api:19.27.0.343"
    runtimeOnly "mezz.jei:jei-1.21.1-neoforge:19.27.0.343"


    // Example mod dependency using a mod jar from ./libs with a flat dir repository
    // This maps to ./libs/coolmod-${mc_version}-${coolmod_version}.jar
    // The group id is ignored when searching -- in this case, it is "blank"
    // implementation "blank:coolmod-${mc_version}:${coolmod_version}"

    // Example mod dependency using a file as dependency
    // implementation files("libs/coolmod-${mc_version}-${coolmod_version}.jar")

    // Example project dependency using a sister or child project:
    // implementation project(":myproject")

    // For more info:
    // http://www.gradle.org/docs/current/userguide/artifact_dependencies_tutorial.html
    // http://www.gradle.org/docs/current/userguide/dependency_management.html
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
var generateModMetadata = tasks.register("generateModMetadata", ProcessResources) {
    var replaceProperties = [minecraft_version      : minecraft_version,
                             minecraft_version_range: minecraft_version_range,
                             neo_version            : neo_version,
                             neo_version_range      : neo_version_range,
                             loader_version_range   : loader_version_range,
                             mod_id                 : mod_id,
                             mod_name               : mod_name,
                             mod_license            : mod_license,
                             mod_version            : mod_version,
                             mod_authors            : mod_authors,
                             mod_description        : mod_description]
    inputs.properties replaceProperties
    expand replaceProperties
    from "src/main/templates"
    into "build/generated/sources/modMetadata"
}

// Include the output of "generateModMetadata" as an input directory for the build
// this works with both building through Gradle and the IDE.
sourceSets.main.resources.srcDir generateModMetadata
// To avoid having to run "generateModMetadata" manually, make it run on every project reload
neoForge.ideSyncTask generateModMetadata

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

test {
    useJUnitPlatform()
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.compilerArgs.add('-Xlint:-deprecation')
}

// ===== Release artifacts (sources jar for other modders) =====
java {
    withSourcesJar()
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}

// ===== Machine model generation — runs before processResources =====
// Mirror of EECoreMachines.registerAll(). Adding a machine here + in Java is all
// that's needed for "one-click registration": models auto-generated at build time.
// 机器模型自动生成——在 processResources 前运行。与 EECoreMachines.registerAll() 同步维护。

tasks.register('genMachineModels') {
    group = 'eecore'
    description = 'Generate block models + blockstate + item stubs for all built-in machines.'
    doLast {
        def tierNames = ['elv', 'lv', 'mv', 'hv', 'ehv', 'uhv', 'phv', 'xhv', 'plv', 'sv', 'bv', 'qv']
        def resBase = java.nio.file.Path.of(System.getProperty('user.dir'), 'src/main/resources')

        // modelIndex = allocation order in EECoreMachines.registerAll()
        def machines = [
            [itemId: 'creative_test',   tier: 1,  index: 4],
            [itemId: 'dispatch_center', tier: 11, index: 5],
        ]

        // Item models — child of ee_machine_item with per-machine textures
        // 物品模型——继承 ee_machine_item 共用几何，只覆写贴图
        def itemDir = resBase.resolve('assets/eecore/models/item')
        java.nio.file.Files.createDirectories(itemDir)
        for (def m : machines) {
            def casing = tierNames[m.tier]
            java.nio.file.Files.writeString(itemDir.resolve("${m.itemId}.json"),
                    '{"parent":"eecore:item/ee_machine_item","textures":{"all":"eecore:block/casings/voltage/' + casing + '/side","front":"eecore:block/machines/' + m.itemId + '/overlay_front"}}')
        }

        for (def m : machines) {
            def casing = tierNames[m.tier]
            def casingTex = "eecore:block/casings/voltage/${casing}/side"

            def blockDir = resBase.resolve("assets/eecore/models/block/machines/${m.itemId}")
            java.nio.file.Files.createDirectories(blockDir)
            def emissiveTex = resBase.resolve("assets/eecore/textures/block/machines/${m.itemId}/overlay_front_e.png")
            def hasEmissive = java.nio.file.Files.exists(emissiveTex)
            if (hasEmissive) {
                java.nio.file.Files.writeString(blockDir.resolve('controller.json'),
                        '{"parent":"eecore:block/ee_base_12_front_emissive","textures":{"particle":"' + casingTex + '","all":"' + casingTex + '","front":"eecore:block/machines/' + m.itemId + '/overlay_front","overlay_emissive":"eecore:block/machines/' + m.itemId + '/overlay_front_e"}}')
            } else {
                java.nio.file.Files.writeString(blockDir.resolve('controller.json'),
                        '{"parent":"eecore:block/ee_base_12","textures":{"particle":"' + casingTex + '","all":"' + casingTex + '","front":"eecore:block/machines/' + m.itemId + '/overlay_front"}}')
            }
        }

        // Blockstate — all 32 model indices / 方块状态——32 个模型索引
        def sb = new StringBuilder('{\n  "variants": {\n')
        for (int idx = 0; idx <= 31; idx++) {
            def ref = 'eecore:block/machine_controller'
            if (idx == 1) ref = 'eecore:block/ee_base_12'
            else if (idx == 2) ref = 'eecore:block/ee_base_16'
            else if (idx != 0 && idx != 3) {
                for (def m : machines) {
                    if (m.index == idx) { ref = "eecore:block/machines/${m.itemId}/controller"; break }
                }
            }
            sb.append('    "facing=north,model=' + idx + '": { "model": "' + ref + '", "y": 0 },\n')
            sb.append('    "facing=east,model=' + idx + '":  { "model": "' + ref + '", "y": 90 },\n')
            sb.append('    "facing=south,model=' + idx + '": { "model": "' + ref + '", "y": 180 },\n')
            sb.append('    "facing=west,model=' + idx + '":  { "model": "' + ref + '", "y": 270 }')
            if (idx < 31) sb.append(',\n\n')
            else sb.append('\n')
        }
        sb.append('  }\n}')
        def bsDir = resBase.resolve('assets/eecore/blockstates')
        java.nio.file.Files.createDirectories(bsDir)
        java.nio.file.Files.writeString(bsDir.resolve('machine_controller.json'), sb.toString())

        logger.lifecycle('genMachineModels: {} machines -> block + blockstate + item stubs', machines.size())
    }
}

processResources.dependsOn genMachineModels

// ===== Production deploy =====
def mcInstance = System.getenv('MC_INSTANCE') ?: project.findProperty('mcInstance')
def prodModsDir = mcInstance ? "${mcInstance}/mods" : null

if (prodModsDir) {
    tasks.register('cleanOldEeCore', Delete) {
        dependsOn build
        delete fileTree(prodModsDir).matching { include 'eecore-*.jar' }
    }
    tasks.register('deploy', Copy) {
        dependsOn cleanOldEeCore
        from("${layout.buildDirectory.get()}/libs/${mod_id}-${mod_version}.jar")
        into(prodModsDir)
    }
}
